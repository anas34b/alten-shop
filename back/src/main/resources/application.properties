# ============================================================
#  CONFIGURATION DE L'APPLICATION — profil de DEVELOPPEMENT
#  (base H2 en memoire, ideale pour developper et tester)
# ============================================================

# Nom de l'application (apparait dans les logs au demarrage)
spring.application.name=shop

# Port d'ecoute du serveur HTTP.
# ${PORT:8081} = utilise la variable d'environnement PORT si elle existe (cas de Render en prod),
# sinon 8081 en local (le 8080 etant occupe par un service WSL/Docker sur cette machine).
server.port=${PORT:8081}


# ---------- BASE DE DONNEES H2 (en memoire) ----------
# "jdbc:h2:mem:shopdb" = base SQL nommee "shopdb" qui vit en MEMOIRE.
# Consequence : son contenu est efface a chaque arret de l'appli
# (parfait pour repartir propre a chaque test).
spring.datasource.url=jdbc:h2:mem:shopdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# ---------- CONSOLE WEB H2 ----------
# Active une interface web pour VOIR les tables et les donnees,
# accessible sur http://localhost:8081/h2-console
# (JDBC URL a saisir dans la console : jdbc:h2:mem:shopdb)
spring.h2.console.enabled=true


# ---------- JPA / HIBERNATE (le moteur de persistance) ----------
# ddl-auto=update : Hibernate CREE et met a jour automatiquement les tables
# de la base a partir de nos classes Java annotees @Entity (on ne tape pas de SQL).
spring.jpa.hibernate.ddl-auto=update

# Affiche dans la console les requetes SQL reellement executees
# (tres pratique pour comprendre/debugger ce que fait Hibernate).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ---------- JWT (jetons de connexion) ----------
# Cle secrete servant a SIGNER les tokens (doit faire >= 32 caracteres pour l'algorithme HS256).
# En PRODUCTION : a externaliser dans une variable d'environnement, jamais en clair dans le depot.
app.jwt.secret=dev-secret-key-a-remplacer-en-prod-0123456789-abcdefghijklmnop

# Duree de validite d'un token, en millisecondes (ici 86400000 ms = 24 heures).
app.jwt.expiration-ms=86400000


# ---------- COMPTE ADMINISTRATEUR ----------
# Seul ce compte peut creer / modifier / supprimer des produits (exigence du sujet).
app.admin.email=admin@admin.com
# Mot de passe de l'admin cree automatiquement au demarrage (DEV uniquement, a changer en prod).
app.admin.password=admin123
